aid: sokowatch
name: Sokowatch / Wasoko
description: >-
  Sokowatch — rebranded as Wasoko in 2022 — is a pan-African B2B e-commerce
  and distribution platform serving informal retailers (the mom-and-pop dukas,
  kiosks, and neighborhood shops that move the majority of fast-moving consumer
  goods across the continent). Founded in 2016 in Nairobi, Kenya by Daniel Yu,
  the platform lets small shopkeepers order FMCG inventory via a mobile app
  or SMS, with free same-day delivery to the shop door, eliminating costly
  trips to wholesalers. Wasoko layers embedded fintech on top of commerce:
  buy-now-pay-later inventory credit, working-capital loans for shopkeepers
  who often lack access to traditional banking, and digital payments. At peak
  the company operated across Kenya, Tanzania, Uganda, Rwanda, Côte d'Ivoire,
  Senegal, and the Democratic Republic of the Congo. In December 2023, Wasoko
  announced a merger with Egyptian B2B peer MaxAB, which closed in August 2024
  to form MaxAB-Wasoko, Africa's largest B2B informal-retail network with
  more than 450,000 merchants across eight countries (combining MaxAB's North
  African footprint in Egypt and Morocco with Wasoko's Sub-Saharan reach) and
  roughly 4,000 employees, co-led by Daniel Yu and MaxAB founder Belal
  El-Megharbel. Post-merger the group exited underperforming markets
  (Zambia, Uganda, Senegal) and pivoted harder into fintech, where margins
  exceed core distribution. Wasoko's revenue model is wholesale-to-retail
  product sales plus fintech (credit, payments) and logistics fees. The
  platform is operated as a closed retailer-facing app; there is no public
  developer API, SDK, partner integration program, or open-source release
  for the commerce, logistics, or fintech surface. The legacy Sokowatch
  GitHub organization exists but contains only forks of third-party tools
  (Apache Superset, Fineract CN, Botpress, Kutt, Portainer) used internally,
  with no first-party libraries or specifications.
